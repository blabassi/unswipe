name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.11.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm run format:check

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Test
        run: pnpm test

      - name: Build docs site
        run: pnpm run build:site

      - name: Verify site artifacts
        run: |
          test -f site/index.html
          test -f site/docs.html
          test -d site/guides
          test -d site/reference
          test -f site/pagefind/pagefind.js || test -d site/pagefind

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Responsive layout audit
        run: |
          mkdir -p .pages
          rm -rf .pages/unswipe
          cp -R site .pages/unswipe
          pnpm dlx serve .pages -p 4173 &
          pnpm dlx wait-on -t 30000 http://127.0.0.1:4173/unswipe/
          pnpm run audit:responsive

      - name: Framework demos audit
        run: pnpm run audit:frameworks
