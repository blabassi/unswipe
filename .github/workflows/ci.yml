name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Build demo site
        run: npm run build:site

      - name: Verify site artifacts
        run: |
          test -f site/index.html
          test -f site/main.js
          test -f site/assets/unswipe.js
          test -f site/assets/plugins/autoplay.js
          test -f site/assets/plugins/navigation.js
          test -f site/assets/plugins/pagination.js
          test -f site/.nojekyll
