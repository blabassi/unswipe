name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install docs dependencies
        run: npm ci
        working-directory: docs

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:coverage

      - name: Build docs site
        run: npm run build:site

      - name: Verify site artifacts
        run: |
          test -f site/index.html
          test -f site/docs.html
          test -d site/guides
          test -d site/reference
          test -f site/pagefind/pagefind.js || test -d site/pagefind

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Responsive layout audit
        run: |
          mkdir -p .pages
          rm -rf .pages/unswipe
          cp -R site .pages/unswipe
          npx --yes serve .pages -p 4173 &
          npx --yes wait-on -t 30000 http://127.0.0.1:4173/unswipe/
          npm run audit:responsive

      - name: Framework demos audit
        run: npm run audit:frameworks
